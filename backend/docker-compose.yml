version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stocks_postgres
    environment:
      POSTGRES_DB: stocks_dev
      POSTGRES_USER: service_user
      POSTGRES_PASSWORD: Dwarf1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U service_user -d stocks_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
